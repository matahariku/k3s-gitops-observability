apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/matahariku/k3s-gitops-observability
    targetRevision: HEAD
    path: apps/harbor/base
    helm:
      name: harbor
      repoURL: https://helm.goharbor.io
      version: '^1.18.0'
      valueFiles:
      - values-gitops.yaml  # Buat ini nanti
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/matahariku/k3s-gitops-observability
    targetRevision: HEAD
    path: apps/harbor/base
    helm:
      releaseName: harbor
      valueFiles:
        - values-gitops.yaml
      parameters:
        - name: expose.ingress.hosts.core[0]
          value: harbor.okfe.net
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
